name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.14"
      - name: Install package
        run: python -m pip install -e ".[dev]"
      - name: Ruff lint
        run: ruff check .
      - name: Ruff format
        run: ruff format --check .
      - name: Mypy
        run: mypy

  test:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        python-version: ["3.11", "3.14"]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install ExifTool (Linux)
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y libimage-exiftool-perl
      - name: Install ExifTool (macOS)
        if: runner.os == 'macOS'
        run: brew install exiftool
      - name: Install ExifTool (Windows)
        if: runner.os == 'Windows'
        run: choco install exiftool -y
      - name: Show ExifTool version
        run: exiftool -ver
      - name: Install package
        run: python -m pip install -e ".[dev]"
      - name: Run tests
        run: pytest --cov=chronocatalog --cov-report=term-missing --cov-fail-under=85
