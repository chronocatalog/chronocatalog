# Example chronocatalog configuration.
#
# Everything here is optional; omitted settings keep their built-in
# defaults. Tables merge with the defaults key by key, arrays replace
# them wholesale.

# Archive root. Can also be given on the command line.
root = "/mnt/archive"

# Glob patterns to leave alone entirely (matched case-sensitively against
# archive-relative paths; import's own ignore list below is separate and
# case-insensitive, since cards use case-insensitive filesystems).
excludes = ["**/CaptureOne/**", "*.cot"]

[import]
# Card files matching these globs are ignored on import (still listed
# in the report, so nothing disappears silently). Matching is
# case-insensitive, as memory card filesystems are. Add "*.jpg" here to
# skip every JPEG, including in-camera RAW conversions.
ignore = ["NIKON001.DSC", "NC_FLLST.DAT"]
# Shooting RAW+JPEG only for the in-camera preview? Skip the JPEG when
# its RAW twin is present. A JPEG without a RAW twin always imports.
skip_jpeg_twins = false

# Subtrees of the root, each holding one kind of media. Files are filed
# into `layout` (tokens: {yyyy}, {mm}, {dd}) under the tree.
[[trees]]
path = "Photos"
media = "photo"
layout = "{yyyy}/{yyyy}-{mm}"

[[trees]]
path = "Video"
media = "video"
layout = "{yyyy}/{yyyy}-{mm}"

# The naming pattern: <datetime><separator><digest slice>.
[pattern]
name = "md5-8"
datetime_format = "%Y%m%d_%H%M%S"
digest = "md5"
digest_length = 8

# Extensions hashed over image data only (metadata excluded), so names
# of formats edited in place never drift. Part of the pattern identity:
# changing this list means a migration.
# image_hash = ["dng", "tif", "tiff", "jpg", "jpeg", "psd"]

# Additional recognized patterns, e.g. while migrating to a new scheme.
# Files named under these are reported as pending migration, never OK.
#
# [[pattern.additional]]
# name = "md5-6"
# digest_length = 6

[dates]
# Timezone used when only a UTC timestamp is available for a file.
timezone = "Europe/Warsaw"
# Metadata fields tried in order until one yields a capture time
# (ExifTool tag names; an optional "Group:" prefix pins the tag group;
# an "@utc" suffix declares a UTC source, converted into the timezone
# above and always flagged in reports — phone MP4s typically need it).
# The synthetic "File:NameTimestamp" entry recovers a strict year-first
# timestamp from the filename itself (20190504_101112.jpg) — useful as
# a late entry for files whose metadata is gone; organize uses it
# automatically, ranked above modification time.
photo = ["EXIF:DateTimeOriginal", "EXIF:CreateDate", "XMP:DateCreated"]
video = ["DateTimeOriginal", "CreateDate", "QuickTime:CreateDate"]

[extensions]
# Master extensions that sidecars may append to (prefix.nef.xmp).
raw = ["nef", "cr2", "cr3", "raf", "rw2", "dng", "arw", "tif", "tiff"]
# Video containers treated as masters in video trees.
video = ["mov", "mp4", "m4v", "avi", "mkv", "braw", "nev", "r3d",
         "mts", "m2ts", "3gp", "wmv", "asf", "mpg", "mpeg"]
# Master formats edited in place: a whole-file content change on these is
# an edit, not corruption. Only consulted for whole-file-hashed masters;
# an extension in pattern.image_hash is judged by its pixels instead.
mutable = ["dng", "tif", "tiff", "jpg", "jpeg", "psd"]

# Sidecars kept in a subdirectory beside their masters
# (<dir>/NKSC_PARAM/<master>.nksc belongs to <dir>/<master>).
[[sidecar_dirs]]
subdir = "NKSC_PARAM"
strip = ".nksc"

# Optional: a DAM renames masters it manages in the listed trees itself;
# chronocatalog deposits the computed name into `token_tag` and the DAM
# renames from that token (works with Adobe Lightroom Classic's
# "Job Identifier" filename token).
[dam]
token_tag = "XMP-photoshop:TransmissionReference"
trees = ["Photos"]
